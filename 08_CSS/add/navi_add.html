<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport">
    <title>Document</title>
    <style>
        div.MenuLevel1{
            width: 100px; 
        }
        div.MenuLevel1 > div {                /* Не могу понять почему не работает float: left;*/
            background-color: yellow;       /* Не могу понять почему display: inline нужен как в этом селекторе, так и в том, что выше*/
            border: solid blue 1px;         /* Также не могу понять почему игнорируется ширина при отражении блоков в строку*/
            position: relative; 
            cursor: pointer;
            width: 100px;
            
        }
        div.MenuLevel2 {
            width: 150px; 
            display: block; 
            position: absolute;   
            left: 80%; 
            top: 90%; 
            z-index: 1;          
            opacity: 0;
        }
        div.MenuLevel2 > div { 
            background-color: cyan; 
            border: solid blue 1px; 
            cursor: pointer; 
        }
        div.MenuLevel1 > div:hover div.MenuLevel2 {           /* логика этой конструкции?*/
                display: block; 
                position: absolute;
                opacity: 1;
                transition: 1s;                 
                left: 80%; 
                top: 90%; 
                z-index: 1;
            }
    </style>
</head>
<body>
    <div class='MenuLevel1'>
        <div>
            Понедельник           
        </div>
        <div>
            Вторник
            <div class='MenuLevel2'>
                <div>
                    Завтрак
                </div>
                <div>
                    Обед
                </div>
                <div>
                    Ужин                    
                </div>
            </div>
        </div>
        <div>
            Среда
            <div class='MenuLevel2'>
                <div>
                    Завтрак
                </div>
                <div>
                    Обед
                </div>
            </div>
        </div>
        <div>
            Четверг
        </div>
        <div>
            Пятница
        </div>
        <div>
            Суббота
        </div>    
    </div>    
</body>
</html>
