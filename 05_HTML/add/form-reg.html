<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>
<body>
    <h1 align="center"> Заполните анкету</h1>
    <form name="form1" action="http://fe.it-academy.by/TestForm.php" method="GET">
        <fieldset>
            <legend>
                Личные данные
            </legend>
            <input type="text" name="surname" placeholder="Фамилия" maxlength="25" autofocus required pattern="[А-Яа-яЁё]+"><br>
            <input type="text" name="name" placeholder="Имя" maxlength="20" required pattern="[А-Яа-яЁё]+"><br>
            <input type="text" name="second_name" placeholder="Отчество" maxlength="24" required pattern="[А-Яа-яЁё]+">
                <fieldset>
                    <legend>
                        Паспортные данные
                    </legend>
                    <input type="text" name="series" placeholder="AA" size="2" maxlength="2" required pattern="[A-Z]{2,}">
                    <input type="text" name="issue" placeholder="1234567" size="7" maxlength="7" required pattern="[0-9]{7,}">
                </fieldset>
                <fieldset>
                    <legend>
                        Дата рождения
                    </legend>
                    <input type="text" name="year_birth" placeholder="2000" size="3" maxlength="4" pattern="[0-9]{4}"> <br>
                    <select name="month_birth">
                        <option value="Январь" selected>Январь</option>
                        <option value="Февраль">Февраль</option>
                        <option value="Март">Март</option>
                        <option value="Апрель">Апрель</option>
                        <option value="Май">Май</option>
                        <option value="Июнь">Июнь</option>
                        <option value="Июль">Июль</option>
                        <option value="Август">Август</option>
                        <option value="Сентябрь">Сентябрь</option>
                        <option value="Октябрь">Октябрь</option>
                        <option value="Ноябрь">Ноябрь</option>
                        <option value="Декабрь">Декабрь</option>                        
                    </select><br>
                    <input type="number" name="date_birth" size="3" maxlength="2" min="1" max="31" step="1"><br>
                </fieldset>                
                <label>
                    <select name="nation" required>
                        <option value="РБ" selected>РБ</option>
                        <option value="РФ">РФ</option>
                        <option value="Иная">Иная</option>                                          
                    </select>
                    (Национальность)<br>
                </label>
                <label>
                    Адрес:<br>
                <textarea name="address" cols="20" rows="2"></textarea>
                </label>

                
        </fieldset>
        <fieldset>
            <legend>
                Интересы
            </legend>
            <fieldset>
                <legend>
                    Хобби
                </legend>
                <input type="checkbox" name="hobby" value="Рыбалка">Рыбалка<br>
                <input type="checkbox" name="hobby" value="Астраномия">Астраномия<br>
                <input type="checkbox" name="hobby" value="Дайвинг">Дайвинг<br>
                <input type="checkbox" name="hobby" value="Марки">Марки
            </fieldset>
            <fieldset>
                <legend>
                    Домашние животные
                </legend>
                <select name="pets" size="12" multiple>
                    <optgroup label="Попугаи">
                        <option value="Волнистый">Волнистый</option>
                        <option value="Ара">Ара</option>
                        <option value="Неразлучник">Неразлучник</option>
                    </optgroup>
                    <optgroup label="Рыба">
                        <option value="Караси">Караси</option>
                        <option value="Окуни">Окуни</option>
                        <option value="Осётр">Осётр</option>
                    </optgroup>
                    <optgroup label="Птицы">
                        <option value="Стая ворон">Стая ворон</option>
                        <option value="Аист">Аист</option>
                        <option value="Археоптерикс">Археоптерикс</option>
                    </optgroup>
                </select>
            </fieldset>
        </fieldset>
        <fieldset>
            <legend>
                Данные для входа и восстановления пароля
            </legend>
            <input type="text" name="login" placeholder="Логин" maxlength="20" required pattern="[A-Za-z]{5,}"><br>
            <input type="password" name="passw" placeholder="Пароль" maxlength="20" autocomplete="off" required pattern="[A-Za-z]{10,}"><br>
        </fieldset>
        <fieldset>
            <legend>
                Координаты
            </legend>
            <input type="email" name="email" placeholder="Введите адрес почты" pattern="^([a-z0-9_-]+\.)*[a-z0-9_-]+@[a-z0-9_-]+(\.[a-z0-9_-]+)*\.[a-z]{2,6}$"><br>
            <input type="url" name="url" placeholder="Введите адрес сайта" pattern="^((https?|ftp)\:\/\/)?([a-z0-9]{1})((\.[a-z0-9-])|([a-z0-9-]))*\.([a-z]{2,6})(\/?)$"><br>
        </fieldset>
        <fieldset>
            <legend>
                Цифры
            </legend>
            <input type="number" name="number" size="7" min="-2.5" max="2.5" step="0.1"><br>
            <input type="range" name="range" min="1" max="10">
        </fieldset>
        <fieldset>
            <legend>
                Кнопки управления
            </legend>
            <input type="submit" value="Отправить">
            <input type="reset" value="Сбросить"><br>
            <button type="button">
                <img src="email.jpg">
            </button>
        </fieldset>    
    </form>
</body>
</html>
